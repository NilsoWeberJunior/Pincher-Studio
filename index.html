<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pincher Studio</title>
    <link href="index.css" rel="stylesheet">
    <link rel="icon" type="image/png" href="assets/Pincher Studio Logo.png">
</head>
<body>
    <div id="MainMenu" style="display: none;">
        <div id="OptionsMenu">
            <h2 id="bemVindo">Olá! Seja bem-vindo ao:</h1>
            <h1 id="bemVindo2">Pincher Studio</h1>
            <h3 id="começarCriar">está pronto para começar a criar?</h3>
            <div id="apps">
                <h3 class="partName">Video 📽️</h3>
                <div id="video" class="part">
                    <div id="PincherAnim" class="partItems">
                        <a title="Pincher Anim - Animation Maker" href="Internal/bars/AnimationCreator/PincherAnim.html">
                            <img src="Internal/bars/AnimationCreator/Pincher Anim - Logo.png">
                        </a>
                    </div>
                </div>
                <h3 class="partName">Audio 🔊</h3>
                <div id="audio" class="part">
                    <div id="PincherAudio" class="partItems">
                        <a title="Pincher Audio - Audio Maker" href="Internal/bars/AudioCreator/PincherAudio/PincherAudio.html">
                            <img src="Internal/bars/AudioCreator/PincherAudio/Pincher Audio Logo.png">
                        </a>
                    </div>
                    <div id="PincherSequencer" class="partItems">
                        <a title="Pincher Sequencer - Song Maker" href="Internal/bars/AudioCreator/PincherSequencer/PincherSequencer.html">
                            <img src="Internal/bars/AudioCreator/PincherSequencer/Pincher Sequencer Logo.png">
                        </a>
                    </div>
                </div>
                <h3 class="partName">Imagem 🖼️</h3>
                <div id="image" class="part">
                    <div id="PincherPainting" class="partItems">
                        <a title="Pincher Painting - Painting Maker" href="Internal/bars/PaintingCreator/PincherPainting.html">
                            <img src="Internal/bars/PaintingCreator/Pincher Painting Logo.png">
                        </a>
                    </div>
                </div>
            </div>
        </div>
        <div id="PincherStudioIcons">
            <img id="PincherStudioIcon" src="assets/Pincher Studio Logo.png">
            <img id="NWJSoftwareLabsIcon" src="assets/nwj_software_labs_logo.png">
        </div>
    </div>

    <div id="main_loading" style="display: flex; align-items: center; justify-content: center; position: absolute; top: 0; left: 0; height: 100%; width: 100%; background-color: white; z-index: 9999;">
        <video loop autoplay muted playsinline src="assets/Pincher Studio - loading logo.mp4" style="width: 50%; max-width: 250px; height: auto;">
        </video>
    </div>

    <script src="index.js"></script>
</body>
</html>
