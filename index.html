<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pincher Studio</title>
    <link href="index.css" rel="stylesheet">
    <link rel="icon" type="image/png" href="assets/Pincher Studio Logo.png">
</head>
<body style="background: green; margin: 0; padding: 0; min-height: 100vh; width: 100vw; position: relative; overflow: hidden;">

    <div id="MainMenu" style="display: none;">
        <div id="OptionsMenu">
            <h2 style="justify-self: center;">Bem Vindo ao Pincher Studio</h2>
            <h3 style="justify-self: center;">O que você deseja fazer hoje?</h3>
            <div id="OptionsMenuButtons" style="justify-self: center;">
                <p>Animação</p>
                <a title="criar nova animação" href="Internal/bars/AnimationCreator/PincherAnim.html" style="position: relative; display: inline;">
                    <img src="assets/CreateNewAnimationButtonIMG.png">
                </a>
                <p>desenho</p>
                <a title="criar nova pintura" href="Internal/bars/PaintingCreator/PincherPainting.html" style="position: relative; display: inline; justify-self: center;">
                    <img src="assets/CreateNewPaintingButtonIMG.png">
                </a>
                <!--<p>audio</p>
                <a title="criar novo audio" href="Internal/bars/PaintingCreator/PincherPainting.html" style="position: relative; display: inline;">
                   <img src="assets/CreateNewAnimationButtonIMG.png">
                </a>-->
            </div>
        </div>
        <div id="PincherStudioIcons">
            <img id="PincherStudioIcon" src="assets/Pincher Studio Logo.png">
            <img id="NWJSoftwareLabsIcon" src="assets/nwj_software_labs_logo.png">
        </div>
    </div>

    <div id="main_loading" style="display: flex; align-items: center; justify-content: center; position: absolute; top: 0; left: 0; height: 100%; width: 100%; background-color: white; z-index: 9999;">
        <video loop autoplay muted playsinline src="assets/Pincher Studio - loading logo.mp4" style="width: 50%; max-width: 250px; height: auto;">
        </video>
    </div>

    <script src="index.js"></script>
</body>
</html>
